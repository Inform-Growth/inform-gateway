[project]
name = "[[ project_slug ]]"
version = "0.1.0"
description = "Agent gateway — centralized MCP server with governed proxied integrations and shadow note-taking"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]",
    "fastapi",
    "uvicorn[standard]",
    "openai",
    "httpx",
    "pyyaml",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "python-dotenv",
    "ruff",
    "starlette",
    "httpx",
]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
