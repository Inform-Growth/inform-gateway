name: CI

# Runs on every push and pull request. Two jobs:
#   1. lint   — ruff (fast, no install of full deps needed for project itself)
#   2. test   — pytest (full suite, gateway deps installed via pip install -e .[dev])
#
# This workflow is part of the synced [core] set distributed to all client repos
# via distribute.yml, so client gateways inherit the same baseline checks.

on:
  push:
    branches: [main, "template/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install --quiet ruff
      - name: Ruff check
        run: ruff check .

  catalog-sync:
    name: Catalog sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet PyYAML
      - name: Verify catalog choices match copier.yml multi-select
        if: hashFiles('catalog/catalog.yaml', 'copier.yml', 'scripts/check_catalog_copier_sync.py') != ''
        run: python scripts/check_catalog_copier_sync.py

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install gateway with dev extras
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q
