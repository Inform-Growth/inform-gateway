[phases.setup]
nixPkgs = ["nodejs_20", "python311"]

[phases.install]
cmds = [
  "python3 -m pip install -e .",
  "npm install --prefix remote-gateway/vendor attio-mcp @modelcontextprotocol/server-github"
]

[start]
cmd = "PATH=/root/.nix-profile/bin:/nix/var/nix/profiles/default/bin:$PATH MCP_TRANSPORT=sse python3 remote-gateway/core/mcp_server.py"
