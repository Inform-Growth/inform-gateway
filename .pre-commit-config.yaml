# Local pre-commit hooks. Install once per clone:
#   pip install pre-commit
#   pre-commit install
#
# Hooks here are fast/deterministic. The full pytest suite is not run on every
# commit — that's the CI workflow's job. Add deeper hooks (mypy, custom checks)
# below as needed.
#
# This config is part of the synced [core] set distributed to all client repos
# via distribute.yml.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # ruff-format intentionally omitted — the team formats by hand for now.

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
